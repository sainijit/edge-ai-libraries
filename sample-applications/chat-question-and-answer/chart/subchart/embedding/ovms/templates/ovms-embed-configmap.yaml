apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.ovms.script.name }}
  labels:
    app: {{ .Values.ovms.script.name }}

data:
  init-embed-script.sh: |-
    #!/bin/bash
    set -e

    model=$1
    weight_format=$2
    hf_token=$3
    gpu_enabled=$4

    MODEL_DOWNLOAD_HOST="{{ .Values.global.modelDownload.serviceName }}"
    MODEL_DOWNLOAD_PORT="{{ .Values.global.modelDownload.port }}"
    
    # Validate that model-download service configuration is set
    if [ -z "$MODEL_DOWNLOAD_HOST" ] || [ -z "$MODEL_DOWNLOAD_PORT" ]; then
        echo "ERROR: global.modelDownload.serviceName and global.modelDownload.port must be set"
        echo "Please set these values in your Helm installation"
        exit 1
    fi
    
    MODEL_DOWNLOAD_BASE_URL="http://${MODEL_DOWNLOAD_HOST}:${MODEL_DOWNLOAD_PORT}/api/v1/"
    MODEL_DOWNLOAD_API_URL="${MODEL_DOWNLOAD_BASE_URL}models/download"
    DOWNLOAD_MODEL_DIR="downloaded_models/"
    WEIGHT_FORMAT="$weight_format"
    
    # Determine target device
    if [ "$gpu_enabled" = "true" ]; then
        DEVICE="{{ .Values.global.gpu.device }}"
    else
        DEVICE="CPU"
    fi

    # Source shared download function
    . /shared/download-ovms-model.sh

    # Download embedding model (no cache_size for embeddings)
    download_ovms_model "$model" "embeddings" "openvino" "$DEVICE" ""

    echo "All steps completed successfully"
