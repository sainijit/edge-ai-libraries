services:
  ovms-service:
    image: openvino/model_server:2026.1-gpu
    devices:
      - ${DRI_MOUNT_PATH:-/dev/null}:/dev/dri
      # NPU device passthrough (preserved from base when GPU enabled)
      - ${ACCEL_MOUNT_PATH:-/dev/null}:/dev/accel/accel0
    ulimits:
      nofile:
        soft: 16384
        hard: 65536
