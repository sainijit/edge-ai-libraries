service:
  retry_attempts: 3
  retry_interval_seconds: 5

subscriptions:
  - alert_type: CONCEALMENT
    dedup:
      enabled: true
      strategy: field_hash
      fields:
        - metadata.poi_id
        - metadata.camera_id
      window_seconds: 30
      on_missing: skip
      hash:
        algorithm: sha1
        truncate: 16

    delivery:
      - type: webhook
        url: ${WEBHOOK_URL}
      - type: mqtt
        topic: alerts/concealment
      - type: log

  - alert_type: LOITERING
    dedup:
      enabled: true
      strategy: field_hash
      fields:
        - metadata.zone_id
      window_seconds: 120
      on_missing: skip
      hash:
        algorithm: sha1
        truncate: 16

    delivery:
      - type: log

  - alert_type: INTRUSION
    dedup:
      enabled: false

    delivery:
      - type: webhook
        url: ${WEBHOOK_URL}
      - type: log
