version: '3.8'

services:
  semantic-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${http_proxy}
        - https_proxy=${https_proxy}
        - no_proxy=${no_proxy}
    image: semantic-search-agent:latest
    container_name: semantic-search-agent
    ports:
      - "${API_PORT:-8080}:8080"    # API endpoint
      - "${METRICS_PORT:-9090}:9090"    # Prometheus metrics
    volumes:
      - ../config:/app/config:ro  # Mount config as read-only
      - ./logs:/app/logs          # Logs directory
    environment:
      - SERVICE_NAME=${SERVICE_NAME:-semantic-search-agent}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VLM_BACKEND=${VLM_BACKEND:-ovms}
      - OVMS_ENDPOINT=${OVMS_ENDPOINT}  # Required if using VLM - provide your OVMS endpoint
      - OVMS_MODEL_NAME=${OVMS_MODEL_NAME}  # Required if using VLM - your model name
      - OVMS_TIMEOUT=${OVMS_TIMEOUT:-30}
      - OPENVINO_MODEL_PATH=${OPENVINO_MODEL_PATH}
      - OPENVINO_DEVICE=${OPENVINO_DEVICE:-GPU}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_BACKEND=${CACHE_BACKEND:-memory}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
      - DEFAULT_MATCHING_STRATEGY=${DEFAULT_MATCHING_STRATEGY:-exact}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.85}
    networks:
      - semantic-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: semantic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - semantic-net
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  semantic-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
